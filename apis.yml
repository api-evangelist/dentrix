name: Dentrix
kind: company
description: >-
  Dentrix is a dental practice management platform from Henry Schein One, used by
  dental offices to manage patients, scheduling, clinical charting, treatment
  planning, insurance, and billing. Dentrix exposes third-party integration APIs
  through two distinct channels. The original Dentrix Developer Program (DDP,
  launched 2012) targets the on-premise Dentrix desktop application: integrations
  run locally against the office's Dentrix database over password-protected ODBC
  connections, stored procedures, table views, and DLL functions (authenticated
  via a RegisterUser call) - it is NOT a public REST/cloud API, and cloud
  integrations require a locally installed desktop agent. The newer Dentrix Ascend
  API Exchange (launched July 2023) is a cloud, REST/JSON API over HTTPS secured
  with OAuth 2.0 on the SOC 2 Type II Dentrix Ascend platform, exposing patient,
  scheduling, claims, and inventory data. Both channels are partner-gated: access
  requires an application, a signed agreement, and paid developer fees. There is no
  public self-serve API key or published OpenAPI, so the APIs below are modeled
  from Henry Schein One's public developer materials rather than an official
  machine-readable specification.
