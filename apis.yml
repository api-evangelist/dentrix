  humanURL: https://www.henryscheinone.com/dental-solutions/api-exchange
  endpointsModeled: true
  properties:
  - url: https://ddp.dentrix.com/pages/faq
    type: Documentation
  - url: https://www.henryscheinone.com/dental-solutions/api-exchange
    type: Documentation
  description: >-
    Read prescription and medication history captured in the patient clinical
    record. Availability is subject to program category and partner agreement;
    exposed through clinical table views/DLL functions on the desktop or REST
    clinical resources on Ascend. Endpoints are modeled from public developer
    materials - the concrete surface is partner-gated.
