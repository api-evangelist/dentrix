  - url: https://www.henryscheinone.com/dental-solutions/api-exchange
    type: Documentation
    note: Henry Schein One API Exchange - Dentrix and Dentrix Ascend integrations, OAuth 2.0, SOC 2 Type II.
  - url: https://www.henryscheinone.com/about-us/press-release/henry-schein-one-launches-dentrix-ascend-api-exchange/
    type: PressRelease
    note: Dentrix Ascend API Exchange launch (July 13, 2023) - cloud, SOC-2 certified marketplace.
  - url: https://support.dentrixascend.com/hc/en-us/community/posts/115002913107-Developer-API
    type: Documentation
    note: Dentrix Ascend developer API community reference - REST/JSON, per-location call and data allowances.
  - url: https://hsps.pro/DentrixEnterprise/APIHelp/index.htm
    type: Documentation
    note: Dentrix Enterprise API Help - separate on-premise API for enterprise/DSO deployments.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on either Dentrix channel, and both
    public developer surfaces are request/response (on-premise ODBC/DLL for the
    desktop DDP, cloud REST/JSON for Dentrix Ascend). No AsyncAPI document was
    created because there is no server-push transport to model. The APIs in
    apis.yml are flagged endpointsModeled because access is partner-gated and no
    official machine-readable specification is published.
